<!DOCTYPE html>
<html lang="it" class="it-wallet-html">

<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title id="tab-title">Accedi</title>
  <meta name="description" id="meta-description" content="">
  <link rel="icon" href="../shared-ui/spid/favicon-32x32.png">

  <link rel="stylesheet" href="../shared-ui/css/style.css?v=wallet-ui-qr-demo">
  <link href="../shared-ui/css/bootstrap-italia.min.css" rel="stylesheet">
  <link href="../shared-ui/css/ita.min.css" rel="stylesheet">

  <style>
    :root {
      --qr-size: 250px;
      --brand-blue: #0072CE;
    }

    .qr-code-link {
      display: inline-block;
      text-decoration: none;
      line-height: 0;
    }

    .qr-code-link:focus-visible {
      outline: 2px solid #0066CC;
      outline-offset: 4px;
      border-radius: 0.25rem;
    }

    .qr-code {
      display: block;
      margin: auto;
      background-color: #fff;
      width: var(--qr-size);
      height: var(--qr-size);
    }

    .qr-code-img {
      width: 10em;
      height: 10em;
    }

    .qr-faded {
      opacity: 0.2;
    }

    .qr-code-payload-wrap {
      position: relative;
      display: inline-block;
    }

    .qr-code-link.qr-faded {
      pointer-events: none;
    }

    .qr-code-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      padding: 0.5rem;
    }

    .qr-code-overlay .btn {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }

    .qr-code-overlay .icon {
      fill: currentColor;
    }

    #content-qrcode-info-text {
      color: #000;
    }

    .btn-custom {
      background-color: var(--brand-blue);
      color: white;
    }

    .qr-payload-preview {
      text-align: center;
      max-width: 36rem;
      margin: 0 auto 1rem;
      padding: 0.75rem;
      background: #f8f9fa;
      border-radius: 0.25rem;
    }

    .qr-payload-preview summary {
      text-align: center;
    }

    .qr-payload-preview a#qr-payload-preview {
      font-family: monospace;
      font-size: 0.75rem;
      word-break: break-all;
      color: #0066CC;
      text-decoration: underline;
    }

    .qr-payload-preview a#qr-payload-preview:hover,
    .qr-payload-preview a#qr-payload-preview:focus {
      color: #004d99;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@1.3.1/i18nextHttpBackend.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next@25.5.2/i18next.min.js"></script>
  <script src="../shared-ui/js/qrcode/qr-code.js"></script>
</head>

<body class="it-wallet-body">
  <nav class="it-skip-links" aria-label="Collegamenti di salto">
    <a id="skip-main" class="visually-hidden-focusable" href="#main-content">Vai al contenuto principale</a>
    <a id="skip-footer" class="visually-hidden-focusable" href="#page-footer">Vai al piè di pagina</a>
  </nav>

  <header class="it-header-wrapper" role="banner">
    <div class="it-header-slim-wrapper bg-primary">
      <div class="container">
        <div class="it-header-slim-wrapper-content d-flex justify-content-between align-items-center">
          <span class="navbar-brand text-white"><strong id="header-region-name"></strong></span>
          <div class="it-header-slim-right-zone">
            <div class="nav-item dropdown it-header-lang-dropdown">
              <button type="button" id="languagesDropButton" class="nav-link dropdown-toggle"
                aria-controls="language-menu"
                data-bs-toggle="dropdown" aria-haspopup="menu" aria-expanded="false">
                <span id="header-lang-active-hint" class="visually-hidden">lingua attiva:</span>
                <span class="it-header-lang-label" aria-hidden="true">ITA</span>
                <svg class="icon icon-sm ms-1" aria-hidden="true">
                  <use href="../shared-ui/svg/sprites.svg#it-expand"></use>
                </svg>
              </button>
              <div id="language-menu" class="dropdown-menu dropdown-menu-end">
                <div class="row">
                  <div class="col-12">
                    <div class="link-list-wrapper">
                      <ul class="link-list" role="menu" aria-labelledby="languagesDropButton">
                        <li>
                          <button type="button" class="dropdown-item list-item it-lang-option active" data-lang="it"
                            role="menuitemradio" aria-checked="true" aria-current="true">
                            <span lang="it">Italiano</span>
                          </button>
                        </li>
                        <li>
                          <button type="button" class="dropdown-item list-item it-lang-option" data-lang="en"
                            role="menuitemradio" aria-checked="false">
                            <span lang="en">English</span>
                          </button>
                        </li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="header-title-section">
      <div class="container py-3">
        <div class="d-flex align-items-center">
          <span id="eid-title" class="visually-hidden">Il tuo logo</span>
          <svg id="header-logo" class="it-header-logo-placeholder" role="img" aria-labelledby="eid-title"
            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" height="32" focusable="false">
            <text id="header-logo-text" class="it-header-logo-placeholder__text" x="0" y="28" aria-hidden="true">Il tuo logo</text>
          </svg>
          <span class="navbar-separator" aria-hidden="true"></span>
          <img src="../shared-ui/img/IT-Wallet-Logo-Primary-BlueItalia.svg" alt="IT-Wallet"
            class="it-wallet-navbar-logo qr-header-logo-wallet" height="32" />
        </div>
      </div>
    </div>
  </header>

  <main id="main-content" class="container my-4 it-wallet-page text-center" aria-labelledby="content-title">
    <div class="it-wallet-title-row">
      <div class="it-wallet-title-slot it-wallet-title-slot--start">
        <a href="#" id="back-link" class="it-wallet-back-link" aria-label="Torna alla pagina precedente">
          <svg class="icon icon-sm me-1" aria-hidden="true">
            <use href="../shared-ui/svg/sprites.svg#it-arrow-left"></use>
          </svg>
          <span class="it-wallet-back-label">Torna indietro</span>
        </a>
      </div>
      <h1 class="it-wallet-title-heading mb-0" id="content-title"></h1>
      <div class="it-wallet-title-slot it-wallet-title-slot--end" aria-hidden="true"></div>
    </div>

    <p id="content-text" class="text-center mb-4 it-wallet-subtitle"></p>

      <div id="content-qrcode" class="d-flex justify-content-center mb-4">
        <div id="content-qrcode-payload" class="qr-code-payload-wrap">
          <a id="qr-code-link" class="qr-code-link" href=""
            aria-label="Codice QR per l'autenticazione con IT-Wallet">
            <qr-code
              contents=""
              module-color="#000000"
              position-ring-color="#000000"
              position-center-color="#000000"
              class="qr-code"
            >
              <img class="icon-qr-code" src="../shared-ui/img/IT-Wallet-Logo-Primary-BlueItalia.svg" slot="icon" alt="" />
            </qr-code>
          </a>
          <div id="content-function" class="qr-code-overlay" hidden>
            <button id="qr-reload-btn" type="button" class="btn btn-primary">
              <svg class="icon icon-sm me-2" aria-hidden="true">
                <use href="../shared-ui/svg/sprites.svg#it-refresh"></use>
              </svg>
              <span id="qr-reload-label">Genera un nuovo codice</span>
            </button>
          </div>
        </div>
      </div>

      <p id="content-qrcode-info-text" class="mb-3" aria-live="polite" aria-atomic="true"></p>

      <details class="qr-payload-preview text-center mb-4">
        <summary id="qr-payload-summary" class="mb-2">Contenuto dimostrativo del QR (Authorization Request)</summary>
        <a id="qr-payload-preview" href=""></a>
      </details>

      <noscript>
        <p id="noscript-message">Per usare la pagina del codice QR è necessario abilitare JavaScript.</p>
      </noscript>
  </main>

  <footer id="page-footer" role="contentinfo" tabindex="-1">
    <div class="container h-100 d-flex align-items-center">
      <nav id="footer-legal-nav" class="d-flex flex-wrap justify-content-start" aria-label="Link legali">
        <a id="footer-legal" href="#" class="text-white me-4 mb-2" target="_blank" rel="noopener"></a>
        <a id="footer-privacy" href="#" class="text-white me-4 mb-2" target="_blank" rel="noopener"></a>
        <a id="footer-accessibility" href="#" class="text-white mb-2" target="_blank" rel="noopener"></a>
      </nav>
    </div>
  </footer>

  <script src="../shared-ui/js/bootstrap-italia.bundle.min.js"></script>
  <script src="../shared-ui/js/header-lang-dropdown.js?v=wallet-ui-qr-demo"></script>
  <script src="js/qr-code-page.js?v=wallet-ui-qr-demo"></script>
</body>

</html>
