openapi: 3.0.1
info:
  title: IT Wallet API - Wallet Provider web services
  version: 0.2.0
  description: IT Wallet Provider e-Service exposed via PDND.
  termsOfService: "https://authentic-source.example.it/tos/"
  contact:
    name: IT-Wallet <wallet_provider>
    url: https://github.com/italia/eid-wallet-it-docs
  x-api-id: WPITW-01
  x-summary: IT Wallet Wallet Provider API.
servers:
  - url: https://test.wallet-provider.example.it/v0.2.0
    description: Wallet Provider API test server
  - url: https://wallet-provider.example.it/v0.2.0
    description: Wallet Provider API production server
paths:
  /status:
    get:
      tags:
        - status
      summary: Get Wallet Provider API status.
      description: Health-check endpoint that returns the operational status of the Wallet Provider API.
      operationId: walletProviderStatus
      responses:
        "200":
          description: Service available
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControlHeader"
            RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
        "429":
          description: Too Many Requests
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
        "503":
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            Retry-After:
              $ref: "#/components/headers/RetryAfterHeader"

  /wallet-instances:
    patch:
      tags:
        - instance
      summary: Notification of User's death.
      description: >-
        This service is used to notify the Wallet Provider of the need to revoke the Wallet Instance and delete the User's account due to the User's death.
      operationId: notifyUserDeath
      parameters:
        - name: DPoP
          in: header
          description: Use only if the DPoP voucher has been requested from PDND.
          schema:
            type: string
            format: JWT
          required: false
        - name: Agid-JWT-Signature
          in: header
          description: >-
            JWT containing the signature of the message headers whose integrity
            needs to be guaranteed, to comply with the INTEGRITY_REST_02
            security pattern (see <a target="blank"
            href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/e-service-pdnd.html">e-Service PDND</a>). <br/><br/>

            <a target="blank" href="https://jwt.io/#debugger-io?token=eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..tG5-P96CCA6N1IYC-xk4GumoVkA3NFolpbBn2vQ2e9vpWQ8f5Sm2l4-1VrXfKTx-CUVz_puiwqkBhulrNKj2fA">EXAMPLE
            ON JWT.IO</a>
          required: true
          schema:
            type: string
            format: JWT
            example: eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..tG5-P96CCA6N1IYC-xk4GumoVkA3NFolpbBn2vQ2e9vpWQ8f5Sm2l4-1VrXfKTx-CUVz_puiwqkBhulrNKj2fA
        - name: Digest
          in: header
          description: >-
            Digest of the message payload, to comply with the INTEGRITY_REST_02
            security pattern. According to <a target="blank" href="https://www.rfc-editor.org/rfc/rfc3230.html#section-4.2">RFC
            3230 §4.2</a>, the format MUST be the following: digest-algorithm=encoded
            digest output.
          required: true
          schema:
            type: string
            example: SHA-256=72e18bdddf13c911b4dd562ee21979a5c9f235c3a01bd1426e857d8c1a282f41
        - name: Agid-JWT-TrackingEvidence
          in: header
          description: >-
            If the Voucher type is Bearer, this header represents a JWT acting as a proof of possession, to comply with the REST_JWS_2021_POP security
            pattern using the POP_TPoP implementation. Otherwise, it is a JWT containing the data tracked in the Consumer's domain, to comply with AUDIT_REST_02 (see <a target="blank"
            href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/e-service-pdnd.html">e-Service PDND</a>). <br/><br/>
            <a target="blank" href="https://jwt.io/#debugger-io?token=eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..y42yfMeW2H9h0b0j0BODUml8yF20stY9q3BwoVU5BB90afBj852Q0QlInncdhjXhUjLS1V76cGBxkutDNvxRNA">EXAMPLE
            ON JWT.IO</a>
          required: false
          schema:
            type: string
            format: JWT
            example: eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..y42yfMeW2H9h0b0j0BODUml8yF20stY9q3BwoVU5BB90afBj852Q0QlInncdhjXhUjLS1V76cGBxkutDNvxRNA
      security:
        - BearerAuth: []
        - DPoPAuth: []
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/NotifyUserDeath"
      responses:
        "207":
          description: Multi-Status
          headers:
            Agid-JWT-Signature:
              description: JWT containing the signature of the message headers whose integrity needs to be guaranteed, to comply with the INTEGRITY_REST_02 security pattern (see <a target="blank" href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/e-service-pdnd.html">e-Service PDND</a>). <a target="blank" href="https://jwt.io/#debugger-io?token=ew0KICAiYWxnIjogIkVTMjU2IiwNCiAgImtpZCI6ICJhMWY1YzhkMi00YjM3LTRlOTEtYjBkMi03OWUzZjBjNGE4ZWYiLA0KICAidHlwIjogIkpXVCINCn0..DpuBNo2UgQhL7WLin4mpdZrbIpQq3tPvCX6HfktkxG7L5mk6a8OK1Hg0mQcZfFi3gelS-aL9kFS-6MoSy4csBg">EXAMPLE
              required: true
              schema:
                type: string
            Digest:
              description: Digest of the message payload, to comply with the INTEGRITY_REST_02 security pattern. According to RFC 3230 Section 4.2 <a target="blank" href="https://www.rfc-editor.org/rfc/rfc3230.html#section-4.2">RFC 3230 §4.2</a>, the format MUST be the following digest-algorithm=encoded digest output.
              required: true
              schema:
                type: string
                example: SHA-256=79a20a744336420301830600ad9bdca993593f876209a004b599b583095b0a61
            Cache-Control:
              $ref: "#/components/headers/CacheControlHeader"
            RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EServiceResponse"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
            WWW-Authenticate:
              $ref: "#/components/headers/WWWAuthenticateHeader"
        "404":
          description: Wallet Instance identifiers not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
        "429":
          description: Too Many Requests
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
        "500":
          description: Internal Server Error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            Retry-After:
              $ref: "#/components/headers/RetryAfterHeader"
        "503":
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            Retry-After:
              $ref: "#/components/headers/RetryAfterHeader"

tags:
  - name: status
    description: Endpoint di health check dell'API.
  - name: instance
    description: Retrieve information about the user's death.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: PDND Bearer Token
    DPoPAuth:
      type: apiKey
      in: header
      name: DPoP
      description: DPoP proof JWT (RFC 9449).

  headers:
    CacheControlHeader:
      schema:
        type: string
        enum:
          - no-store
      description: no-store
    RateLimitLimitHeader:
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Maximum number of requests within the time window.
    RateLimitRemainingHeader:
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Remaining requests within the time window.
    RateLimitResetHeader:
      schema:
        type: integer
        format: int32
        minimum: 0
      description: UTC epoch in seconds, corresponding to when the window for the current rate limit will reset.
    RetryAfterHeader:
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Seconds to wait before receiving another response.
    WWWAuthenticateHeader:
      schema:
        type: string
        example: >-
          Bearer error="invalid_token", error_description="The access token expired"
      description: The request cannot be fulfilled because the Voucher is expired, revoked or otherwise malformed. See <a target="blank" href="https://datatracker.ietf.org/doc/html/rfc6750.html#section-3">RFC6750</a> and <a target="blank" href="https://datatracker.ietf.org/doc/html/rfc9449.html#section-7.1-11">RFC9449</a> for details.

  schemas:
    EServiceResponse:
      properties:
        result:
          type: object
          properties:
            revoked:
              type: array
              items:
                type: string
              description: List of Wallet Instances successfully rekoved.
            not_found:
              type: array
              items:
                type: string
              description: List of Wallet Instances not revoked as their identifier were not found at the Wallet Provider.
            already_revoked:
              type: array
              items:
                type: string
              description: List of Wallet Instances that were already revoked by the Wallet Provider.
          required: [revoked, not_found, already_revoked]
          description: >-
            JSON object specifying which Wallet Instance was successfully revoked, which was already revoked and which was not found.
        result_description:
          description: Response Description.
          type: string
          example: The service partially process the revocation of the requested Wallet Instances as some identifiers were not found.
          required: [result, result_description]
    ProblemDetails:
      type: object
      description: RFC7807-compliant problem details object for error responses.
      properties:
        type:
          type: string
          format: uri
          description: An absolute URI that identifies the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
        instance:
          type: string
          format: uri
          description: An absolute URI that identifies the specific occurrence of the problem.
      required: [title, status, detail]
    NotifyUserDeath:
      required:
        - wallet_instance_ids
      type: object
      properties:
        wallet_instance_ids:
          type: array
          items:
            type: string
          description: >-
            Identifiers of the Wallet Instances whose PID was revoked due to User death.
