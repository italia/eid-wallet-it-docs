openapi: 3.0.1
info:
  title: IT Wallet API - Issuer web services
  version: 0.1.0
  x-summary: IT Wallet Issuer e-Services exposed via PDND.
  contact:
    url: https://github.com/italia/eid-wallet-it-docs
servers:
  - url: https://issuer.example.it/v1.4.0
    description: Credential Issuer API
paths:
  /status:
    get:
      tags:
        - e-services PDND
      summary: Retrieve Issuer API status.
      description: Health-check endpoint that returns the operational status of the Issuer API.
      operationId: getIssuerStatus
      responses:
        "200":
          description: OK
  /v0.9.0/wallet-report/{api}:
    get:
      tags:
        - e-services PDND
      summary: Get Statistics
      description: This service returns statistical data on issued Digital Credentials
      operationId: walletGetReport
      parameters:
        - name: api
          in: path
          required: true
          schema:
            type: string
        - name: typesCredentials
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
        - name: typeData
          in: query
          required: false
          schema:
            type: string
        - name: fromData
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: toData
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: DPoP
          in: header
          description: >-
            DPoP proof JWT, to comply with the REST_JWS_2021_POP security
            pattern using the POP_DPoP implementation. See also <a target="blank"
            href="https://datatracker.ietf.org/doc/html/rfc9449.html">RFC
            9449</a>.<br/><br/>

            <a target="blank" href="https://jwt.io/#debugger-io?.eyJqdGkiOiItQndDM0VTYzZhY2MybFRjIiwiaHRtIjoiR0VUIiwiYXRoIjoiNzFkZWY4MWYyZjE3MWI1MmFkYWMxNzg5ODI3NmFlZWU5OTlhZWUzZDNkZmE3NjkyMjJjODA0NDBmNDQ0ODgxYSIsImh0dSI6Imh0dHBzOi8vc2VydmVyLmV4YW1wbGUuY29tL3Rva2VuIiwiaWF0IjoxNzYyMjYyNjE2fQ.H9r1N2s8xp_rcNr4Bs7_n-6vNKN4BPsvXzsV_UWwWiyr314xPMv4v6_8ac2SIbM-cJ-O4hlZysOUrjC7rewlag">EXAMPLE
            ON JWT.IO</a>
          required: false
          schema:
            type: string
            format: JWT
            example: >-
              .eyJqdGkiOiItQndDM0VTYzZhY2MybFRjIiwiaHRtIjoiR0VUIiwiYXRoIjoiNzFkZWY4MWYyZjE3MWI1MmFkYWMxNzg5ODI3NmFlZWU5OTlhZWUzZDNkZmE3NjkyMjJjODA0NDBmNDQ0ODgxYSIsImh0dSI6Imh0dHBzOi8vc2VydmVyLmV4YW1wbGUuY29tL3Rva2VuIiwiaWF0IjoxNzYyMjYyNjE2fQ.H9r1N2s8xp_rcNr4Bs7_n-6vNKN4BPsvXzsV_UWwWiyr314xPMv4v6_8ac2SIbM-cJ-O4hlZysOUrjC7rewlag
        - name: Agid-JWT-TrackingEvidence
          in: header
          description: >-
             If the Voucher type is Bearer, this header represents a JWT acting as a proof of possession, to comply with the REST_JWS_2021_POP security
             pattern using the POP_TPoP implementation. Otherwise, it is a JWT containing the data tracked in the Consumer's domain, to comply with AUDIT_REST_02 (see <a target="blank"
             href="https://italia.github.io/eid-wallet-it-docs/v1.0.0/en/e-service-pdnd.html">e-Service PDND</a>). <br/><br/>
             <a target="blank" href="https://jwt.io/#debugger-io?token=eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..y42yfMeW2H9h0b0j0BODUml8yF20stY9q3BwoVU5BB90afBj852Q0QlInncdhjXhUjLS1V76cGBxkutDNvxRNA">EXAMPLE ON JWT.IO</a>
          required: false
          schema:
            type: string
            format: JWT
            example: eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..y42yfMeW2H9h0b0j0BODUml8yF20stY9q3BwoVU5BB90afBj852Q0QlInncdhjXhUjLS1V76cGBxkutDNvxRNA
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 200 OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseReport"
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ProblemDetails:
      type: object
      description: RFC7807-compliant problem details object for error responses.
      properties:
        type:
          type: string
          format: uri
          description: An absolute URI that identifies the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
        instance:
          type: string
          format: uri
          description: An absolute URI that identifies the specific occurrence of the problem.
      required: [title, status, detail]
    ResponseReport:
      type: object
      properties:
        countEid:
          type: integer
          format: int64
        count:
          type: integer
          format: int64
        countPid:
          $ref: "#/components/schemas/TotalCountCredential"
        countMdl:
          $ref: "#/components/schemas/TotalCountCredential"
        countEdc:
          $ref: "#/components/schemas/TotalCountCredential"
        countTeam:
          $ref: "#/components/schemas/TotalCountCredential"
    TotalCountCredential:
      type: object
      properties:
        credEmesse:
          type: integer
          format: int64
        credValide:
          type: integer
          format: int64
        credInvalide:
          type: integer
          format: int64
