openapi: 3.0.1
info:
  title: IT Wallet API - AS web services
  version: 0.2.0
  description: |
    # IT Wallet Authentic Source e-Service exposed via PDND.
    ### ModI patterns to be used:
      - <b>ID_AUTH_CHANNEL_01</b>: Direct Trust TLS (HTTPS)
      - <b>ID_AUTH_REST_01</b>: Authorization via PDND token
      - <b>INTEGRITY_REST_02</b>: Requests and responses are signed
      - <b>AUDIT_REST_02</b>: Additional properties (the pattern is optional if DPoP Token is used)
      - <b>DPoP Token</b>: Used as an alternative to a Bearer Token (optional)
  termsOfService: "https://authentic-source.example.it/tos/"
  contact:
    name: IT-Wallet <credential_name> <credential_provider>
    url: https://github.com/italia/eid-wallet-it-docs
  x-api-id: ASITW-01
  x-summary: IT-Wallet Authentic Source API.
servers:
  - url: https://test.authentic-source.example.it/v0.2.0
    description: Authentic Source API test server
  - url: https://authentic-source.example.it/v0.2.0
    description: Authentic Source API production server
security:
  - BearerAuth: []
  - DPoPAuth: []
paths:
  /status:
    get:
      tags:
        - status
      summary: Get Authentic Source API status.
      description: Health-check endpoint that returns the operational status of the Authentic Source API.
      operationId: authenticSourceStatus
      parameters:
        - name: DPoP
          in: header
          description: Use only if the DPoP voucher has been requested from PDND.
          schema:
            type: string
            format: JWT
          required: false
      responses:
        "200":
          description: Service available
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControlHeader"
            X-RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            X-RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
        "429":
          description: Too Many Requests
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            # RFC 6585 defines Retry-After. X-RateLimit-Limit, X-RateLimit-Remaining and X-RateLimit-Reset are not required because redundant along with Retry-After.
            Retry-After:
              $ref: "#/components/headers/RetryAfterHeader"
        "503":
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            Retry-After:
              $ref: "#/components/headers/RetryAfterHeader"

  /attribute-claims/{datasetId}:
    post:
      tags:
        - credential
      summary: Get Attribute Claims
      description: >-
        This service provides the Credential Issuer with all attribute claims necessary for the issuance of a Digital Credential
      operationId: attributeClaims
      parameters:
        - in: path
          name: datasetId
          schema:
            type: string
          required: true
          description: Identifier of the dataset as registered in the Authentic Source Registry
        - name: DPoP
          in: header
          description: Use only if the DPoP voucher has been requested from PDND.
          schema:
            type: string
            format: JWT
          required: false
        - name: Agid-JWT-Signature
          in: header
          description: >-
            JWT containing the signature of the message headers whose integrity
            needs to be guaranteed, to comply with the INTEGRITY_REST_02
            security pattern (see <a target="blank"
            href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/e-service-pdnd.html">e-Service PDND</a>). <br/><br/>

            <a target="blank" href="https://jwt.io/#debugger-io?token=eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..tG5-P96CCA6N1IYC-xk4GumoVkA3NFolpbBn2vQ2e9vpWQ8f5Sm2l4-1VrXfKTx-CUVz_puiwqkBhulrNKj2fA">EXAMPLE
            ON JWT.IO</a>
          required: true
          schema:
            type: string
            format: JWT
            example: eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..tG5-P96CCA6N1IYC-xk4GumoVkA3NFolpbBn2vQ2e9vpWQ8f5Sm2l4-1VrXfKTx-CUVz_puiwqkBhulrNKj2fA
        - name: Digest
          in: header
          description: >-
            Digest of the message payload, to comply with the INTEGRITY_REST_02
            security pattern. According to <a target="blank" href="https://www.rfc-editor.org/rfc/rfc3230.html#section-4.2">RFC
            3230 §4.2</a>, the format MUST be the following: digest-algorithm=encoded
            digest output.
          required: true
          schema:
            type: string
            example: SHA-256=72e18bdddf13c911b4dd562ee21979a5c9f235c3a01bd1426e857d8c1a282f41
        - name: Agid-JWT-TrackingEvidence
          in: header
          description: >-
            If the Voucher type is Bearer, this header represents a JWT acting as a proof of possession, to comply with the REST_JWS_2021_POP security
            pattern using the POP_TPoP implementation. Otherwise, it is a JWT containing the data tracked in the Consumer's domain, to comply with AUDIT_REST_02 (see <a target="blank"
            href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/e-service-pdnd.html">e-Service PDND</a>). <br/><br/>
            <a target="blank" href="https://jwt.io/#debugger-io?token=eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..y42yfMeW2H9h0b0j0BODUml8yF20stY9q3BwoVU5BB90afBj852Q0QlInncdhjXhUjLS1V76cGBxkutDNvxRNA">EXAMPLE
            ON JWT.IO</a>
          required: false
          schema:
            type: string
            format: JWT
            example: eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..y42yfMeW2H9h0b0j0BODUml8yF20stY9q3BwoVU5BB90afBj852Q0QlInncdhjXhUjLS1V76cGBxkutDNvxRNA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialClaimsRequest"
      responses:
        "200":
          description: OK
          headers:
            Agid-JWT-Signature:
              description: JWT containing the signature of the message headers whose integrity needs to be guaranteed, to comply with the INTEGRITY_REST_02 security pattern (see <a target="blank" href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/e-service-pdnd.html">e-Service PDND</a>). <a target="blank" href="https://jwt.io/#debugger-io?token=ew0KICAiYWxnIjogIkVTMjU2IiwNCiAgImtpZCI6ICJhMWY1YzhkMi00YjM3LTRlOTEtYjBkMi03OWUzZjBjNGE4ZWYiLA0KICAidHlwIjogIkpXVCINCn0..DpuBNo2UgQhL7WLin4mpdZrbIpQq3tPvCX6HfktkxG7L5mk6a8OK1Hg0mQcZfFi3gelS-aL9kFS-6MoSy4csBg">EXAMPLE
              required: true
              schema:
                type: string
            Digest:
              description: Digest of the message payload, to comply with the INTEGRITY_REST_02 security pattern. According to RFC 3230 Section 4.2 <a target="blank" href="https://www.rfc-editor.org/rfc/rfc3230.html#section-4.2">RFC 3230 §4.2</a>, the format MUST be the following digest-algorithm=encoded digest output.
              required: true
              schema:
                type: string
                example: SHA-256=79a20a744336420301830600ad9bdca993593f876209a004b599b583095b0a61
            Cache-Control:
              $ref: "#/components/headers/CacheControlHeader"
            X-RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            X-RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialClaimsResponse"
              example:
                interval: 864000
                userClaims:
                  given_name: "Mario"
                  family_name: "Rossi"
                  birth_date: "1980-01-10"
                  birth_place: "Roma"
                  tax_id_code: "TINIT-RSSMRA80A01H501Z"
                  personal_administrative_number: "12345A123A"
                attributeClaims:
                  - object_id: "6F9619FF-8B86-D011-B42D-00C04FC964FF"
                    status: "VALID"
                    last_updated: "2025-01-15T10:30:00Z"
                    institute_name: "Nome Istituto Universitario"
                    programme_type_name: "Laurea Magistrale"
                    degree_course_name: "Computer Science - Informatica"
                    academic_qualification_date: "2025-06-25"
                  - object_id: "7A0720AB-9C97-E122-C53E-11D05FD075GG"
                    status: "VALID"
                    last_updated: "2025-01-10T08:00:00Z"
                    institute_name: "Nome Istituto Universitario"
                    programme_type_name: "Laurea Triennale"
                    degree_course_name: "Informatica"
                    academic_qualification_date: "2022-11-27"
                metadataClaims:
                  - object_id: "6F9619FF-8B86-D011-B42D-00C04FC964FF"
                    issuance_date: "2025-06-25"
                  - object_id: "7A0720AB-9C97-E122-C53E-11D05FD075GG"
                    issuance_date: "2022-11-27"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            X-RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            X-RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
            WWW-Authenticate:
              $ref: "#/components/headers/WWWAuthenticateHeader"
        "404":
          description: Claims not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimitHeader"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemainingHeader"
            X-RateLimit-Reset:
              $ref: "#/components/headers/RateLimitResetHeader"
        "429":
          description: Too Many Requests
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            # RFC 6585 defines Retry-After. X-RateLimit-Limit, X-RateLimit-Remaining and X-RateLimit-Reset are not required because redundant along with Retry-After.
            Retry-After:
              $ref: "#/components/headers/RetryAfterHeader"
        "500":
          description: Internal Server Error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            Retry-After:
              $ref: "#/components/headers/RetryAfterHeader"
        "503":
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
          headers:
            Retry-After:
              $ref: "#/components/headers/RetryAfterHeader"

tags:
  - name: status
    description: Endpoint di health check dell'API.
  - name: credential
    description: Retrieve information about the credential.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: PDND Bearer Token
    DPoPAuth:
      type: apiKey
      in: header
      name: DPoP
      description: DPoP proof JWT (RFC 9449).

  headers:
    CacheControlHeader:
      schema:
        type: string
        enum:
          - no-store
      description: no-store
    RateLimitLimitHeader:
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Maximum number of requests within the time window.
    RateLimitRemainingHeader:
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Remaining requests within the time window.
    RateLimitResetHeader:
      schema:
        type: integer
        format: int32
        minimum: 0
      description: UTC epoch in seconds, corresponding to when the window for the current rate limit will reset.
    RetryAfterHeader:
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Seconds to wait before receiving another response.
    WWWAuthenticateHeader:
      schema:
        type: string
        example: >-
          Bearer error="invalid_token", error_description="The access token expired"
      description: The request cannot be fulfilled because the Voucher is expired, revoked or otherwise malformed. See <a target="blank" href="https://datatracker.ietf.org/doc/html/rfc6750.html#section-3">RFC6750</a> and <a target="blank" href="https://datatracker.ietf.org/doc/html/rfc9449.html#section-7.1-11">RFC9449</a> for details.

  schemas:
    CredentialClaimsResponse:
      type: object
      properties:
        userClaims:
          description: List of User Claims.
          type: object
          properties:
            given_name:
              description: Current First Name.
              type: string
              example: "Mario"
            family_name:
              description: Current Family Name.
              type: string
              example: "Rossi"
            birth_date:
              description: Date of Birth.
              type: string
              example: "1980-01-10"
            birth_place:
              description: Place of Birth.
              type: string
              example: "Roma"
            tax_id_code:
              description: National tax identification number. REQUIRED if personal_administrative_number is absent.
              type: string
              example: "TINIT-XXXXXXXXXXXXXXXX"
            personal_administrative_number:
              description: National unique identifier of a natural person. REQUIRED if tax_id_code is absent.
              type: string
              example: "XX00000XX"
        attributeClaims:
          description: List of Datasets of Attribute.
          type: array
          items:
            type: object
            properties:
              object_id:
                description: Unique identifier of the Dataset. It MUST NOT contain personal data. Required also if additionalProperties are not present. This parameter MUST be used to notify through Signal Hub data updating or availability.
                type: string
                example: "6F9619FF-8B86-D011-B42D-00C04FC964FF"
              issuance_date:
                description: Administrative validity start date of the Dataset
                type: string
                example: "2025-01-01"
              expiry_date:
                description: Administrative expiry date of the Dataset.
                type: string
                example: "2025-12-31"
            additionalProperties:
              type: string
            required: [object_id]
        metadataClaims:
          description: List of Metadata of Attribute.
          type: array
          items:
            type: object
            properties:
              object_id:
                description: Unique identifier of the Dataset. It MUST NOT contain personal data.
                type: string
                example: "6F9619FF-8B86-D011-B42D-00C04FC964FF"
              description:
                description: Human-Readable description of the Dataset.
                type: string
                example: "Example: Master's Degree in Computer Science"
              status:
                description: |
                  Status of the Dataset. REQUIRED if additionalProperties of attributeClaims are present. Issued and Expired datasets fall within VALID; expiry is verified
                  via metadata claims (e.g. expiry_date, nbf/exp). INVALID indicates active revocation by the AS.
                  For how this status affects the Digital Credential lifecycle managed by the Credential
                  Issuer, see <a target="blank" href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/credential-revocation.html#status-update-by-authentic-sources">Status Update by Authentic Sources</a>.
                type: string
                enum:
                  - VALID
                  - INVALID
                  - SUSPENDED
                x-enum-description:
                  - VALID - Dataset is valid (includes Issued and Expired; expiry checked via metadata).
                  - INVALID - Dataset has been actively revoked by the Authentic Source.
                  - SUSPENDED - Dataset is temporarily invalid (typically reversible).
                example: "VALID"
              status_description:
                description: Human-Readable description of the Status.
                type: string
                example: "Example: Master's Degree in Computer Science"
              last_updated:
                description: REQUIRED if additionalProperties of attributeClaims are present. Last time the status or attributes of the Dataset have been updated. Its format is `YYYY-MM-DDTHH:MM:SSZ`.
                type: string
                example: "2025-01-15T10:30:00Z"
              interval:
                description: Required if userClaims and additionalProperties of AttributeClaim parameters are not present. This represents the estimated amount of time (in seconds) required before making the request of the attribute claims again.
                type: integer
                format: int64
                example: 864000
            required: [object_id, description]
      required: [attributeClaims, metadataClaims]
    CredentialClaimsRequest:
      required:
        - unique_id
      type: object
      properties:
        unique_id:
          type: string
          description: ID ANPR or Tax identification number
        object_id:
          type: string
          description: Unique identifier of the Credential dataset. If this parameter is present only the indicated dataset is returned.
    ProblemDetails:
      type: object
      description: RFC7807-compliant problem details object for error responses.
      properties:
        type:
          type: string
          format: uri
          description: An absolute URI that identifies the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
        instance:
          type: string
          format: uri
          description: An absolute URI that identifies the specific occurrence of the problem.
      required: [title, status, detail]
