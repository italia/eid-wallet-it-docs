{%- from "components/icons.html" import icon_brightness, icon_expand with context -%}
<div class="nav-item dropdown it-docs-brightness-dropdown">
  <button type="button"
          id="it-docs-brightness-toggle"
          class="it-docs-brightness-toggle nav-link dropdown-toggle"
          aria-controls="it-docs-brightness-menu"
          data-bs-toggle="dropdown"
          aria-haspopup="menu"
          aria-expanded="false"
          title="{{ _('Content brightness') }}">
    <span id="it-docs-brightness-active-hint" class="visually-hidden">
      {{ _('Active brightness:') }}
    </span>
    {{ icon_brightness() }}
    <span class="visually-hidden" id="it-docs-brightness-current-label">{{ _('Light') }}</span>
    {{ icon_expand('icon ms-1 it-docs-brightness-chevron') }}
  </button>
  <div id="it-docs-brightness-menu" class="dropdown-menu dropdown-menu-end">
    <div class="row">
      <div class="col-12">
        <div class="link-list-wrapper">
          <ul class="link-list" role="menu" aria-labelledby="it-docs-brightness-toggle">
            <li>
              <button type="button"
                      class="dropdown-item list-item it-docs-brightness-option active"
                      data-it-docs-brightness="light"
                      role="menuitemradio"
                      aria-checked="true">
                <span>{{ _('Light') }}</span>
              </button>
            </li>
            <li>
              <button type="button"
                      class="dropdown-item list-item it-docs-brightness-option"
                      data-it-docs-brightness="middle"
                      role="menuitemradio"
                      aria-checked="false">
                <span>{{ _('Middle') }}</span>
              </button>
            </li>
            <li>
              <button type="button"
                      class="dropdown-item list-item it-docs-brightness-option"
                      data-it-docs-brightness="black"
                      role="menuitemradio"
                      aria-checked="false">
                <span>{{ _('Black') }}</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
