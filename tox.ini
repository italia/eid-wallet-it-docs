[tox]
envlist = py312, build, build-single, labels, refactor
skipsdist = True

[testenv]
deps =
  setuptools>=65.0.0
  -rrequirements-dev.txt
commands =
  doc8  --ignore D001,D002,D003,D004 docs

[testenv:py312]
deps =
  -rrequirements-dev.txt
commands =
  doc8  --ignore D001,D002,D003,D004 docs
  sphinx-build -b html -W -d html/it/doctrees docs/it/  html/it
  sphinx-build -b html -W -d html/en/doctrees docs/en/  html/en

[testenv:py36-build]
commands =
  doc8  --ignore D001,D002,D003,D004 docs
  sphinx-build -b html -W -d html/it/doctrees docs/it/  html/it
  sphinx-build -b html -W -d html/en/doctrees docs/en/  html/en


[testenv:build]
commands =
  doc8  --ignore D001,D002,D003,D004 docs
  sphinx-build -b html -W -d html/it/doctrees docs/it/  html/it
  sphinx-build -b html -W -d html/en/doctrees docs/en/  html/en

[testenv:build-single]
commands =
  doc8  --ignore D001,D002,D003,D004 docs
  sphinx-build -b singlehtml -W -d html/it/doctrees docs/it/  html/it-single
  sphinx-build -b singlehtml -W -d html/en/doctrees docs/en/  html/en-single
  
[testenv:labels]
# Use system site-packages so container's setuptools (pkg_resources) is available (Python 3.12)
venv_options = --system-site-packages
deps =
  setuptools>=65.0.0
  -rrequirements-dev.txt
commands =
  sphinx-build -b dummy -W docs/it  _build/labels/it
  sphinx-build -b dummy -W docs/en  _build/labels/en
  
# Replace special characters in docs.
[testenv:refactor]
deps = 
whitelist_externals =
  find
commands = 
  find docs -name *.rst -exec  sed -i 's/[“”]/"/g; '  \{\} ;
  find docs -name *.rst -exec  sed -i 's,HTTP header \([a-zA-Z\-]\+\),:httpheader:`\1`,g' \{\} ;
  find docs -name *.rst -exec  sed -i 's,HTTP method \([a-zA-Z\-]\+\),:httpmethod:`\1`,g' \{\} ;
  find docs -name *.rst -exec  sed -i 's,HTTP status \([0-9][0-9][0-9]\) \(ok\|not found\|internal server error\|unauthorized\|accepted\|bad request\),:httpstatus:`\1`,gi' \{\} ;
  find docs -name *.rst -exec sed -i 's/RFC \([0-9]\+\)/:rfc:`\1`/g' \{\} ;
  find docs -name *.rst -exec sed -i 's/\*\*\[:rfc:`\([0-9]\+\)`\]\*\*/    [RFC\1]    /g' \{\} ;

