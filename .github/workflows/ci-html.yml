# This is a basic workflow to help you get started with Actions

name: test-html

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder

concurrency:
  # Use branch name (or PR head branch) so push & PR for the same branch share the same group
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v3.4.0
        with:
          skip_after_successful_duplicate: 'true'
          same_content_newer: 'true'

  build_image:
    runs-on: ubuntu-latest
    # Always try to (re)build the image; cache will make no-op builds cheap
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Sphinx/LaTeX image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # This workflow contains a single job called "build"
  main_job:
    
    needs: [pre_job, build_image]
    if: needs.pre_job.outputs.should_skip != 'true'

    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder:latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      # Runs tests inside the pre-built Sphinx/tox container
      - name: Run Sphinx/labels tests via tox
        run: |-
          tox -e labels
          tox -e build
