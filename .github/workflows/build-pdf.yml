name: pdf-build

on:
  release:
    types:
      - published
  # Run on tag push so PDF is built and published even when release is created from tag later
  push:
    tags:
      - '*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # read + write; needed to upload release assets / create release on tag push
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder

jobs:
  # On release we don't need to rebuild the image; use existing. Paths-filter can fail when ref is a tag (no push base), so we bypass it on release.
  check_image_deps:
    runs-on: ubuntu-latest
    outputs:
      build-image: ${{ steps.set_default.outputs.build-image || steps.filter.outputs.build-image }}
    steps:
      - uses: actions/checkout@v4
      - name: No image rebuild on release or tag push (use existing image)
        if: github.event_name == 'release' || (github.event_name == 'push' && github.ref_type == 'tag')
        id: set_default
        run: echo "build-image=false" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v3
        if: github.event_name != 'release' && !(github.event_name == 'push' && github.ref_type == 'tag')
        id: filter
        with:
          filters: |
            build-image:
              - 'Dockerfile'
              - 'requirements-dev.txt'
              - 'tox.ini'

  check_image_exists:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.pull.outputs.exists }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check if builder image exists in GHCR
        id: pull
        run: |
          if docker pull ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder:latest 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # On release/tag: we never build a new image — reuse existing image (latest). Job runs only so dependents (get_image_tag, build-pdf) are not skipped.
  # Otherwise: build when deps changed or image missing in GHCR.
  build-image:
    runs-on: ubuntu-latest
    needs: [check_image_deps, check_image_exists]
    outputs:
      built: ${{ steps.built.outputs.built }}
    if: |
      (github.event_name == 'release' || (github.event_name == 'push' && github.ref_type == 'tag')) ||
      (needs.check_image_deps.outputs.build-image == 'true') ||
      (needs.check_image_exists.outputs.exists != 'true')
    steps:
      - name: Set built flag (reuse existing image on release/tag; build only when deps or image missing)
        id: built
        run: |
          if [[ "${{ github.event_name }}" == "release" ]] || ( [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref_type }}" == "tag" ]] ); then
            echo "built=false" >> $GITHUB_OUTPUT
            echo "Reusing existing image for release/tag — no image build"
          else
            echo "built=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.built.outputs.built == 'true'
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: steps.built.outputs.built == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Sphinx/LaTeX image
        if: steps.built.outputs.built == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  get_image_tag:
    runs-on: ubuntu-latest
    needs: [build-image]
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - id: set_tag
        run: |
          # Use SHA only when we actually built the image; otherwise use latest (release/tag push or build skipped/failed).
          if [ "${{ needs.build-image.result }}" = "success" ] && [ "${{ needs.build-image.outputs.built }}" = "true" ]; then
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

  # Produces PDFs and uploads as release assets on release; on manual run uploads as artifact. Always runs when get_image_tag provides a tag.
  build-pdf:
    runs-on: ubuntu-latest
    needs: [get_image_tag]
    container:
      image: ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder:${{ needs.get_image_tag.outputs.tag }}
    env:
      SETTINGS_FILE_NAME: "eid-wallet-it-docs"
    steps:
      - uses: actions/checkout@v4

      # Python, Java, LaTeX, Graphviz, ImageMagick, etc. are provided by the container image
      # Append appropriate tags to document title based on build context
      - name: Append tags to document title
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/en/conf.py
            echo "Applied release tag '${TAG}' to document titles"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/en/conf.py
            echo "Applied tag '${TAG}' to document titles"
          else
            # This is for workflow_dispatch, we use editor's copy designation
            echo "Using default title for manual build"
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Versione Corrente"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Editor'"'"'s Copy"/' docs/en/conf.py
          fi

          sed -i 's/settings_file_name = ".*"/settings_file_name = "'"$SETTINGS_FILE_NAME"'"/' docs/en/conf.py

      - name: Generate LaTeX files and build en version
        run: |
          echo "Building English version..."
          sphinx-build -b latex docs/en/ build/latex/en
          cd build/latex/en

          # Build 
          echo "=== First LaTeX run ==="
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" 
          
          echo "Processing index..."
          makeindex -s python.ist "$SETTINGS_FILE_NAME.idx" || true
          
          echo "=== Second LaTeX run ==="
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" 
          
          echo "=== Final LaTeX run ==="
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" 

          echo "=== Build completed ==="
          ls -la "$SETTINGS_FILE_NAME.pdf" || echo "PDF not generated!"


      - name: Generate LaTeX files and build it version
        run: |
          sphinx-build -b latex docs/it/ build/latex/it
          cd build/latex/it
          # Build 
          echo "=== First LaTeX run ==="
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" 
          
          echo "Processing index..."
          makeindex -s python.ist "$SETTINGS_FILE_NAME.idx" || true
          
          echo "=== Second LaTeX run ==="
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" 
          
          echo "=== Final LaTeX run ==="
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | grep -E "Warning|Error" 

          echo "=== Build completed ==="
          ls -la "$SETTINGS_FILE_NAME.pdf" || echo "PDF not generated!"

      - name: Create PDF directory
        run: |
          mkdir -p pdf_output
          
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          cp build/latex/it/$SETTINGS_FILE_NAME.pdf pdf_output/$SETTINGS_FILE_NAME-it-${TIMESTAMP}.pdf
          cp build/latex/en/$SETTINGS_FILE_NAME.pdf pdf_output/$SETTINGS_FILE_NAME-en-${TIMESTAMP}.pdf

      - name: Upload PDFs as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: documentation-pdf
          path: pdf_output/*.pdf

      - name: Upload Release Asset
        if: github.event_name == 'release' || (github.event_name == 'push' && github.ref_type == 'tag')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: pdf_output/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
