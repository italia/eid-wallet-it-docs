name: pdf-build

on:
  release:
    types:
      - published

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    env:
      SETTINGS_FILE_NAME: "eid-wallet-it-docs"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"
          cache: 'pip'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install LaTeX and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-luatex
          # Common pkg
          sudo apt-get install -y texlive-latex-recommended
          # languages pkg
          sudo apt-get install -y texlive-lang-italian texlive-lang-english
          # graphix nd images pkg
          sudo apt-get install -y texlive-pictures texlive-font-utils graphviz
          # utils for imgs (svg, pdf, ..)
          sudo apt-get install -y ghostscript poppler-utils imagemagick netpbm
          # Core pkg
          sudo apt-get install -y texlive-base texlive-binaries
          # Additional pkg (fonts, tables, formatting, etc.)
          sudo apt-get install -y texlive-fonts-extra texlive-science texlive-publishers texlive-formats-extra

      - name: Install Python dependencies
        run: |
          python -m pip install -r requirements-dev.txt

      # Append appropriate tags to document title based on build context
      - name: Append tags to document title
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/en/conf.py
            echo "Applied release tag '${TAG}' to document titles"
          else
            # This is for workflow_dispatch, we use editor's copy designation
            echo "Using default title for manual build"
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Versione Corrente"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Editor'"'"'s Copy"/' docs/en/conf.py
          fi

          sed -i 's/settings_file_name = ".*"/settings_file_name = "'"$SETTINGS_FILE_NAME"'"/' docs/en/conf.py

      - name: Generate LaTeX files and build en version
        run: |
          echo "Building English version..."
          sphinx-build -b latex docs/en/ build/latex/en
          for f in build/latex/en/images/pdf/*.pdf; do [ -f "$f" ] || continue; out="${f%.pdf}-t.pdf"; gs -sDEVICE=pdfwrite -dCompatibilityLevel=1.5 -dNOPAUSE -dQUIET -dBATCH -sOutputFile="$out" "$f" 2>/dev/null; [ -f "$out" ] && mv "$out" "$f"; rm -f "$out"; done
          sed -i '/\\documentclass.*sphinxmanual/a \\\\pdfminorversion=7' build/latex/en/eid-wallet-it-docs.tex
          cd build/latex/en

          run_lualatex() {
            lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex" 2>&1 | tee -a lualatex-en.log
            rc=${PIPESTATUS[0]}; return $rc
          }
          : > lualatex-en.log

          echo "=== First LaTeX run ==="
          run_lualatex || { echo "First lualatex run failed. Last 120 lines of log:"; tail -120 lualatex-en.log; exit 1; }
          echo "Processing index..."
          makeindex -s python.ist "$SETTINGS_FILE_NAME.idx" || true
          echo "=== Second LaTeX run ==="
          run_lualatex || { echo "Second lualatex run failed. Last 120 lines of log:"; tail -120 lualatex-en.log; exit 1; }
          echo "=== Third LaTeX run ==="
          run_lualatex || { echo "Third lualatex run failed. Last 120 lines of log:"; tail -120 lualatex-en.log; exit 1; }

          if [ ! -f "$SETTINGS_FILE_NAME.pdf" ]; then
            echo "ERROR: English PDF was not generated."
            echo "=== Last 120 lines of LaTeX log ==="
            tail -120 lualatex-en.log
            exit 1
          fi
          ls -la "$SETTINGS_FILE_NAME.pdf"


      - name: Generate LaTeX files and build it version
        run: |
          sphinx-build -b latex docs/it/ build/latex/it
          for f in build/latex/it/images/pdf/*.pdf; do [ -f "$f" ] || continue; out="${f%.pdf}-t.pdf"; gs -sDEVICE=pdfwrite -dCompatibilityLevel=1.5 -dNOPAUSE -dQUIET -dBATCH -sOutputFile="$out" "$f" 2>/dev/null; [ -f "$out" ] && mv "$out" "$f"; rm -f "$out"; done
          sed -i '/\\documentclass.*sphinxmanual/a \\\\pdfminorversion=7' build/latex/it/eid-wallet-it-docs.tex
          cd build/latex/it
          echo "=== First LaTeX run ==="
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex"
          echo "Processing index..."
          makeindex -s python.ist "$SETTINGS_FILE_NAME.idx" || true
          echo "=== Second LaTeX run ==="
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex"
          echo "=== Final LaTeX run ==="
          lualatex -interaction=nonstopmode -file-line-error "$SETTINGS_FILE_NAME.tex"

          if [ ! -f "$SETTINGS_FILE_NAME.pdf" ]; then
            echo "ERROR: Italian PDF was not generated"
            exit 1
          fi
          ls -la "$SETTINGS_FILE_NAME.pdf"

      - name: Create PDF directory
        run: |
          mkdir -p pdf_output
          
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          cp build/latex/it/$SETTINGS_FILE_NAME.pdf pdf_output/$SETTINGS_FILE_NAME-it-${TIMESTAMP}.pdf
          cp build/latex/en/$SETTINGS_FILE_NAME.pdf pdf_output/$SETTINGS_FILE_NAME-en-${TIMESTAMP}.pdf

      - name: Upload PDFs as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: documentation-pdf
          path: pdf_output/*.pdf

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: pdf_output/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload LaTeX log on failure
        if: failure() && hashFiles('build/latex/en/lualatex-en.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: lualatex-en-log
          path: build/latex/en/lualatex-en.log

      - name: Upload LaTeX log (it) on failure
        if: failure() && hashFiles('build/latex/it/lualatex-it.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: lualatex-it-log
          path: build/latex/it/lualatex-it.log
