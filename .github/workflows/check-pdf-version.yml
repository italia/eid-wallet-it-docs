name: Check PDF version (1.5 only)

on:
  push:
    branches: [ "*" ]
    paths:
      - 'docs/en/images/pdf/**'
      - 'docs/it/images/pdf/**'
      - '.github/workflows/check-pdf-version.yml'
  pull_request:
    branches: [ "*" ]
    paths:
      - 'docs/en/images/pdf/**'
      - 'docs/it/images/pdf/**'
      - '.github/workflows/check-pdf-version.yml'

concurrency:
  group: check-pdf-version-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  check-pdf-version:
    name: Ensure all PDFs are version 1.5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pdfinfo (poppler-utils)
        run: sudo apt-get update -qq && sudo apt-get install -y poppler-utils

      - name: Check PDF versions in docs/en and docs/it
        run: |
          bash utils/check_pdf_version.sh 1.5 docs/en/images/pdf docs/it/images/pdf
