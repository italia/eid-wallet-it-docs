name: gh-pages

on:
  push:
    branches:
      - 'versione-corrente'
    tags:
      - '*'
    paths:
      - 'docs/**'
      - 'official_resources/**'
      - 'Dockerfile'
      - 'requirements-dev.txt'
      - 'tox.ini'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'docs/**'
      - 'official_resources/**'
      - 'Dockerfile'
      - 'requirements-dev.txt'
      - 'tox.ini'
  release:
    types:
      - published

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # read + write; needed to push to gh-pages branch
  packages: write

env:
  DEFAULT_BRANCH: versione-corrente
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check_image_deps:
    runs-on: ubuntu-latest
    outputs:
      build-image: ${{ steps.set_default.outputs.build-image || steps.filter.outputs.build-image }}
    steps:
      - uses: actions/checkout@v4
      - name: No image rebuild on release or tag push (use existing image)
        if: github.event_name == 'release' || (github.event_name == 'push' && github.ref_type == 'tag')
        id: set_default
        run: echo "build-image=false" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v3
        if: github.event_name != 'release' && !(github.event_name == 'push' && github.ref_type == 'tag')
        id: filter
        with:
          filters: |
            build-image:
              - 'Dockerfile'
              - 'requirements-dev.txt'
              - 'tox.ini'

  check_image_exists:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.pull.outputs.exists }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check if builder image exists in GHCR
        id: pull
        run: |
          if docker pull ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder:latest 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # Build only when image deps changed OR when no image exists in GHCR yet
  build-image:
    runs-on: ubuntu-latest
    needs: [check_image_deps, check_image_exists]
    if: |
      ((needs.check_image_deps.outputs.build-image == 'true') ||
       (needs.check_image_exists.outputs.exists != 'true')) &&
      (github.event_name == 'push' ||
       github.event_name == 'release' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Sphinx/LaTeX image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  get_image_tag:
    runs-on: ubuntu-latest
    needs: [build-image]
    if: always() && (github.event_name == 'release' || (github.event_name == 'push' && github.ref_type == 'tag') || needs.build-image.result == 'success' || needs.build-image.result == 'skipped' || needs.build-image.result == 'failure')
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - id: set_tag
        run: |
          if [ "${{ needs.build-image.result }}" = "success" ]; then
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

  build-and-index:
    runs-on: ubuntu-latest
    needs: [get_image_tag]
    container:
      image: ghcr.io/${{ github.repository_owner }}/eidas-it-wallet-docs-builder:${{ needs.get_image_tag.outputs.tag }}
    # Run job ONLY if:
    # 1. It's a push to a branch (e.g. versione-corrente) or a tag
    # 2. It's a PR from the same repository (not from a fork)
    # 3. It's a release or a manual workflow_dispatch
    if: |
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      # Check out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v4

      # Determine deployment path based on event type
      - name: Generate deployment paths
        id: deployment
        run: |
          # Debug information
          echo "GitHub ref: $GITHUB_REF"
          echo "GitHub head ref: $GITHUB_HEAD_REF"
          echo "GitHub ref type: $GITHUB_REF_TYPE"
          echo "Event name: ${{ github.event_name }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "path=prs/pr${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "path=releases/${TAG}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            echo "path=releases/${TAG}" >> $GITHUB_OUTPUT
          else
            # Default case - push to default branch
            echo "path=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT
          fi

      # Append appropriate tags to document title based on build context
      - name: Append tags to document title
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/en/conf.py
            echo "Applied release tag '${TAG}' to document titles"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Release '"${TAG}"'"/' docs/en/conf.py
            echo "Applied tag '${TAG}' to document titles"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            sed -i 's/\(settings_project_name = ".*\)"/\1 - PR #'"${PR_NUM}"'"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - PR #'"${PR_NUM}"'"/' docs/en/conf.py
            echo "Applied PR tag '#${PR_NUM}' to document titles"
          else
            # This is for push to main branch or workflow_dispatch
            echo "Using default title for main branch"
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Versione Corrente"/' docs/it/conf.py
            sed -i 's/\(settings_project_name = ".*\)"/\1 - Editor'"'"'s Copy"/' docs/en/conf.py
          fi

      - name: Create build directories
        run: |-
          mkdir -p "html/${{ steps.deployment.outputs.path }}/it"
          mkdir -p "html/${{ steps.deployment.outputs.path }}/en"

      # Fast check: labels and cross-references before heavy HTML build
      - name: Quick labels and xref check (IT/EN)
        run: |
          sphinx-build -b dummy -W docs/it  _build/labels/it
          sphinx-build -b dummy -W docs/en  _build/labels/en

      # Run Sphinx build for HTML output
      - name: Build branch
        run: |-
          echo "Building html/${{ steps.deployment.outputs.path }}/it"
          echo "Building html/${{ steps.deployment.outputs.path }}/en"

          sphinx-build -b html docs/it/ html/${{ steps.deployment.outputs.path }}/it
          sphinx-build -b html docs/en/ html/${{ steps.deployment.outputs.path }}/en

      # Copy scripts and templates for deployment
      - name: Copy python scripts for deploy
        run: |
          mkdir -p html/scripts/ && cp -r .github/scripts/* html/scripts/
          mkdir -p html/templates/ && cp -r .github/templates/* html/templates/
          mkdir -p html/static/ && cp -r .github/static/* html/static/

      # Copy official_resources for GitHub Pages deployment
      - name: Copy official resources
        run: |
          mkdir -p html/official_resources/ && cp -r official_resources/* html/official_resources/

      # Check out the gh-pages branch in a temporary directory
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-temp

      # Integrate new content and update gh-pages
      - name: Integrate and update gh-pages content
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Copy all generated files to the temporary directory
          rsync -av html/ gh-pages-temp/
          
          cd gh-pages-temp
          
          # Clean up old PR directories and generate index
          python ./scripts/cleanup_old_prs.py
          python ./scripts/generate_index.py
          
          # Configure git for commit
          git config --local user.name 'GitHub Actions'
          git config --local user.email 'actions@github.com'
          
          # Add modified files and commit
          git add .
          git commit -m "Update documentation and regenerate index"
          git push
